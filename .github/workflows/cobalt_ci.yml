name: cobalt CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "dev/cefi" branch
  push:
    branches: [ "dev/cefi" ]
  pull_request:
    branches: [ "dev/cefi" ]
  workflow_dispatch:    

env:
  BRANCH_NAME: main 

jobs:
  # This workflow contains a single job called "build"
  run-obgc_1d-ci:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # define container
    container:
       image: ghcr.io/noaa-gfdl/cefi-regional-mom6/1d_mom6_cobalt:base
       options: --user=builder

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: jitterbit/get-changed-files@v1
        id: abc
        with:
          format: space-delimited
          token: ${{ secrets.GITHUB_TOKEN }}   

      # git clone CEFI-regional-MOM6 and replace ocean_BGC
      - name: git clone CEFI-regional-MOM6 
        working-directory: ../
        run: |
          pwd
          ls -l -h
          git clone -b $BRANCH_NAME https://github.com/NOAA-GFDL/CEFI-regional-MOM6.git --recursive
          rm -rf CEFI-regional-MOM6/src/ocean_BGC
          cp -r ocean_BGC CEFI-regional-MOM6/src
          cd CEFI-regional-MOM6/src/ocean_BGC && git branch

      - name: Copy 1D model input dataset
        working-directory: ../CEFI-regional-MOM6/exps
        run: |
          ln -fs /opt/datasets ./
          ls -l -h ./datasets
          
      - name: Build mom6sis2-cobalt
        working-directory: ../CEFI-regional-MOM6/builds
        run: |
          echo "build mom6sis2..."
          ./linux-build.bash -m docker -p linux-gnu -t debug -f mom6sis2
          ls -l -h build/docker-linux-gnu/ocean_ice/debug/MOM6SIS2

      - name: Run 1D BATS case
        working-directory: ../CEFI-regional-MOM6/exps/OM4.single_column.COBALT
        run: |
          echo "Start 1D BATS case ..."
          pwd
          ./driver.sh
          cat ./RESTART_48hrs/ocean.stats

      - name: Check with ref 
        working-directory: ../CEFI-regional-MOM6/exps/OM4.single_column.COBALT
        run: |      
          echo "new 48 hrs ocean.stats: "
          cat ./RESTART_48hrs/ocean.stats
          echo "baseline 48 hrs ocean.stats: "
          cat ../../src/ocean_BGC/.github/ref/OM4.single_column.COBALT.p4/docker-linux-gnu/ocean.stats
          #
          diff -q ./RESTART_48hrs/ocean.stats ../../src/ocean_BGC/.github/ref/OM4.single_column.COBALT.p4/docker-linux-gnu/ocean.stats > /dev/null || { echo "Error: ocean.stats are different."; echo "Plz update ocean_BGC/.github/ref/OM4.single_column.COBALT.p4/docker-linux-gnu/ocean.stats with the following: "; cat ./RESTART_48hrs/ocean.stats; exit 1; }

      - name: Check oxygen budget closure
        id: check_o2
        working-directory: ../CEFI-regional-MOM6/exps/OM4.single_column.COBALT
        run: |
          # Select second time step
          ncks -d time,1 20040101.ocean_cobalt_budget.nc o2_col_budget.nc
          # Average over xh and yh
          ncwa -a xh,yh o2_col_budget.nc -O o2_col_budget.nc
          # Check residual for surface layer
          ncks -d zl,0 o2_col_budget.nc o2_sfc_budget.nc
          resid=$( ncap2 -s 'result = o2h_tendency -
              (o2_advection_xy + o2h_tendency_vert_remap + o2_vdiffuse_impl + o2_diffusion_xy + jo2h);
              print(result)' o2_sfc_budget.nc |  awk -F'=' '{print $2}')
          python3 check_residual.py $resid
          # Check residual for column total
          ncwa -y ttl -a zl o2_col_budget.nc o2_tot_budget.nc
          resid=$( ncap2 -s 'result = o2h_tendency -
              (o2_advection_xy + o2h_tendency_vert_remap + o2_vdiffuse_impl + o2_diffusion_xy + jo2h);
              print(result)' o2_tot_budget.nc |  awk -F'=' '{print $2}')
          python3 check_residual.py $resid

      - name: Check alkalinity budget closure
        id: check_alk
        working-directory: ../CEFI-regional-MOM6/exps/OM4.single_column.COBALT
        run: |
          # Select second time step
          ncks -d time,1 20040101.ocean_cobalt_budget.nc alk_col_budget.nc
          # Average over xh and yh
          ncwa -a xh,yh alk_col_budget.nc -O alk_col_budget.nc
          # Check residual for surface layer
          ncks -d zl,0 alk_col_budget.nc alk_sfc_budget.nc
          resid=$( ncap2 -s 'result = alkh_tendency -
              (alk_advection_xy + alkh_tendency_vert_remap + alk_vdiffuse_impl + alk_diffusion_xy + jalkh);
              print(result)' alk_sfc_budget.nc |  awk -F'=' '{print $2}')
          python3 check_residual.py $resid
          # Check residual for column total
          ncwa -y ttl -a zl alk_col_budget.nc alk_tot_budget.nc
          resid=$( ncap2 -s 'result = alkh_tendency -
              (alk_advection_xy + alkh_tendency_vert_remap + alk_vdiffuse_impl + alk_diffusion_xy + jalkh);
              print(result)' alk_tot_budget.nc |  awk -F'=' '{print $2}')
          python3 check_residual.py $resid

      - name: Check nitrate budget closure
        id: check_no3
        working-directory: ../CEFI-regional-MOM6/exps/OM4.single_column.COBALT
        run: |
          # Select second time step
          ncks -d time,1 20040101.ocean_cobalt_budget.nc no3_col_budget.nc
          # Average over xh and yh
          ncwa -a xh,yh no3_col_budget.nc -O no3_col_budget.nc
          # Check residual for surface layer
          ncks -d zl,0 no3_col_budget.nc no3_sfc_budget.nc
          resid=$( ncap2 -s 'result = no3h_tendency -
              (no3_advection_xy + no3h_tendency_vert_remap + no3_vdiffuse_impl + no3_diffusion_xy + jno3h);
              print(result)' no3_sfc_budget.nc |  awk -F'=' '{print $2}')
          python3 check_residual.py $resid
          # Check residual for column total
          ncwa -y ttl -a zl no3_col_budget.nc no3_tot_budget.nc
          resid=$( ncap2 -s 'result = no3h_tendency -
              (no3_advection_xy + no3h_tendency_vert_remap + no3_vdiffuse_impl + no3_diffusion_xy + jno3h);
              print(result)' no3_tot_budget.nc |  awk -F'=' '{print $2}')
          python3 check_residual.py $resid
